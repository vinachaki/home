<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>VINCHAKI - Portal Khách Hàng</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      z-index: 9999;
    }
  </style>
</head>

<body>

<div id="loading">Đang tải hệ thống...</div>

<iframe 
  src="https://script.google.com/macros/s/AKfycbyzdez8TmRRlbmk0jdQOmuV2asbOfGaoSwTfKok6SifRPB8tb3eltk9wdH198Z4W34/exec"
  onload="document.getElementById('loading').style.display='none'">
</iframe>

</body>
</html>
