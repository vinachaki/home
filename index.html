<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>VINCHAKI - Portal Khách Hàng</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      z-index: 9999;
    }
  </style>
</head>

<body>

<style>
  #loading {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
    color: white;
    font-family: sans-serif;
  }

  .spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top: 4px solid #38bdf8;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 15px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>

<div id="loading">
  <div class="spinner"></div>
  <div>Đang tải hệ thống...</div>
</div>

<iframe 
  src="https://script.google.com/macros/s/AKfycbyzdez8TmRRlbmk0jdQOmuV2asbOfGaoSwTfKok6SifRPB8tb3eltk9wdH198Z4W34/exec"
  onload="document.getElementById('loading').style.display='none'">
</iframe>



</body>
</html>
